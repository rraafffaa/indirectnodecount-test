---
- name: AWS Daily Lifecycle - Create VPC, EC2, Start, Delete
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    region: us-east-1
    name_tag: "daily-lifecycle-{{ lookup('pipe', 'date +%Y%m%d') }}"
    instance_type: t3.micro
    vpc_cidr: "10.200.0.0/16"
    subnet_cidr: "10.200.1.0/24"

  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ name_tag }}-vpc"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ region }}"
        tags:
          purpose: daily-lifecycle-test
          created_by: aap-automation
      register: vpc

    - name: Create internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: "{{ name_tag }}-igw"
      register: igw

    - name: Create subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ subnet_cidr }}"
        region: "{{ region }}"
        az: "{{ region }}a"
        map_public: true
        tags:
          Name: "{{ name_tag }}-subnet"
      register: subnet

    - name: Create route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        subnets:
          - "{{ subnet.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        tags:
          Name: "{{ name_tag }}-rtb"
      register: rtb

    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ name_tag }}-sg"
        description: "Daily lifecycle test SG"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
            rule_desc: SSH
        tags:
          purpose: daily-lifecycle-test
      register: sg

    - name: Get latest RHEL 9 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ region }}"
        owners:
          - "309956199498"
        filters:
          name: "RHEL-9.*_HVM-*-x86_64-*"
          state: available
      register: ami_info

    - name: Set AMI ID
      ansible.builtin.set_fact:
        ami_id: "{{ (ami_info.images | sort(attribute='creation_date') | last).image_id }}"

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ name_tag }}-ec2"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        region: "{{ region }}"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        security_groups:
          - "{{ sg.group_id }}"
        network:
          assign_public_ip: true
        state: running
        wait: true
        tags:
          purpose: daily-lifecycle-test
          created_by: aap-automation
      register: ec2

    - name: Display EC2 info
      ansible.builtin.debug:
        msg: "EC2 {{ name_tag }}-ec2 launched — Instance ID: {{ ec2.instances[0].instance_id }} — Public IP: {{ ec2.instances[0].public_ip_address | default('pending') }}"

    - name: Pause to let instance run briefly
      ansible.builtin.pause:
        seconds: 30
        prompt: "EC2 instance is running. Waiting 30 seconds before cleanup..."

    - name: Terminate EC2 instance
      amazon.aws.ec2_instance:
        instance_ids:
          - "{{ ec2.instances[0].instance_id }}"
        region: "{{ region }}"
        state: terminated
        wait: true

    - name: Delete security group
      amazon.aws.ec2_security_group:
        group_id: "{{ sg.group_id }}"
        region: "{{ region }}"
        state: absent

    - name: Delete subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ subnet_cidr }}"
        region: "{{ region }}"
        state: absent

    - name: Delete route table
      amazon.aws.ec2_vpc_route_table:
        route_table_id: "{{ rtb.route_table.id }}"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        lookup: id
        state: absent

    - name: Delete internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        state: absent

    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ name_tag }}-vpc"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ region }}"
        state: absent

    - name: Confirm cleanup
      ansible.builtin.debug:
        msg: "All AWS resources for {{ name_tag }} deleted successfully."
