---
- name: Azure Daily Lifecycle - Create RG, VM, Start, Delete
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    resource_group: "daily-lifecycle-rg-{{ lookup('pipe', 'date +%Y%m%d') }}"
    location: eastus
    vm_name: "daily-lifecycle-vm-{{ lookup('pipe', 'date +%Y%m%d') }}"
    vm_size: Standard_B1s
    admin_user: azureuser

  tasks:
    - name: Create resource group
      azure.azcollection.azure_rm_resourcegroup:
        name: "{{ resource_group }}"
        location: "{{ location }}"
        tags:
          purpose: daily-lifecycle-test
          created_by: aap-automation

    - name: Create virtual network
      azure.azcollection.azure_rm_virtualnetwork:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}-vnet"
        address_prefixes: "10.100.0.0/16"

    - name: Create subnet
      azure.azcollection.azure_rm_subnet:
        resource_group: "{{ resource_group }}"
        virtual_network: "{{ vm_name }}-vnet"
        name: "{{ vm_name }}-subnet"
        address_prefix: "10.100.0.0/24"

    - name: Create public IP
      azure.azcollection.azure_rm_publicipaddress:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}-pip"
        allocation_method: Dynamic

    - name: Create network security group
      azure.azcollection.azure_rm_securitygroup:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}-nsg"
        rules:
          - name: SSH
            protocol: Tcp
            destination_port_range: 22
            access: Allow
            priority: 1001
            direction: Inbound

    - name: Create NIC
      azure.azcollection.azure_rm_networkinterface:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}-nic"
        virtual_network: "{{ vm_name }}-vnet"
        subnet_name: "{{ vm_name }}-subnet"
        security_group: "{{ vm_name }}-nsg"
        ip_configurations:
          - name: default
            public_ip_address_name: "{{ vm_name }}-pip"
            primary: true

    - name: Create VM
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}"
        vm_size: "{{ vm_size }}"
        admin_username: "{{ admin_user }}"
        ssh_password_enabled: false
        ssh_public_keys:
          - path: "/home/{{ admin_user }}/.ssh/authorized_keys"
            key_data: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQDummy_key_for_lifecycle_test"
        network_interfaces: "{{ vm_name }}-nic"
        image:
          offer: RHEL
          publisher: RedHat
          sku: "9_4"
          version: latest
        tags:
          purpose: daily-lifecycle-test
      register: vm_result

    - name: Display VM info
      ansible.builtin.debug:
        msg: "VM {{ vm_name }} created in {{ resource_group }} — State: {{ vm_result.ansible_facts.azure_vm.powerstate | default('created') }}"

    - name: Start VM (ensure running)
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ resource_group }}"
        name: "{{ vm_name }}"
        started: true

    - name: Pause to let VM run briefly
      ansible.builtin.pause:
        seconds: 30
        prompt: "VM is running. Waiting 30 seconds before cleanup..."

    - name: Delete resource group (removes everything)
      azure.azcollection.azure_rm_resourcegroup:
        name: "{{ resource_group }}"
        state: absent
        force_delete_nonempty: true

    - name: Confirm cleanup
      ansible.builtin.debug:
        msg: "Resource group {{ resource_group }} and all resources deleted successfully."
